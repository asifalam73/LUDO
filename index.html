<!doctype html>
<html lang="en">

        </div>

                <div class="h-lad-row">
                    <div class="cell"></div>
                    <div class="cell red"><span class="star">&#9733</span></div>

                    <div class="cell"></div>
                    <div class="cell"></div>
                    <div class="cell"></div>
                </div>
            </div>
            <div class="ludo-home">HOME</div>

                <div class="h-lad-row">
                    <div class="cell"></div>
                    <div class="cell"></div>
                    <div class="cell"></div>

        <div class="box border-blue">
